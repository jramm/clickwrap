# Reverse proxy for the clickwrap-server ADMIN surface.
#
# Serves the admin-ui SPA at "/" and reverse-proxies the ENTIRE backend under /api/* (same-origin).
# The admin-ui is built with VITE_API_URL=/api, so its API calls go to /api/admin/**; nginx strips
# the /api prefix and forwards to the backend at root.
#
# Why /api: the SPA uses react-router history mode with client-side routes (/, /customers,
# /documents, …) that by name overlap the backend's controllers of the same path. Putting the whole
# backend under the disjoint /api/* namespace means the SPA owns every non-/api path and NO current
# or future backend route can ever collide — no per-route allow-listing needed.
#
# The public/integration surface (hosted acceptance page /accept, public /documents, integration
# /customers, /webhooks, /files) is served by the backend directly on its own origin
# (PUBLIC_BASE_URL); see docker-compose.yml (backend published on :3000). It does NOT go through /api.

server {
  listen 80;
  server_name _;

  # Admin version upload is multipart PDF; the backend caps it at 20 MB (FileInterceptor).
  client_max_body_size 25m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  root /usr/share/nginx/html;
  index index.html;

  # --- backend, same-origin, under /api/* (trailing slash on proxy_pass strips the /api prefix) ---
  # /api/admin/foo → backend /admin/foo ; /api/health → backend /health ; etc.
  location /api/ {
    proxy_pass http://backend:3000/;
  }

  # --- admin-ui SPA: client-side routing owns every non-/api path ---
  location / {
    try_files $uri $uri/ /index.html;
  }
}
