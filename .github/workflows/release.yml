name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # GitHub release
  packages: write # ghcr.io push

jobs:
  docker:
    name: Build & push ${{ matrix.target }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          # backend: API + hosted acceptance page only.
          - target: backend
            image: ghcr.io/${{ github.repository }}
            build_args: ''
          # admin-ui: nginx + SPA, proxies /api to a separate backend (SPA base=/, VITE_API_URL=/api).
          - target: admin-ui
            image: ghcr.io/${{ github.repository }}-admin-ui
            build_args: |
              VITE_API_URL=/api
              VITE_BASE=/
          # combined: backend + SPA under /ui in one container (SPA base=/ui/, VITE_API_URL=/).
          - target: combined
            image: ghcr.io/${{ github.repository }}-combined
            build_args: |
              VITE_API_URL=/
              VITE_BASE=/ui/
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  publish-sdk:
    name: Publish plugin SDK to GitHub Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jramm'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # Build @jramm/clickwrap-plugin-sdk from src/plugin-sdk at the tag version, then publish it.
      - run: node scripts/build-sdk.mjs "${{ github.ref_name }}"
      - run: npm publish
        working-directory: sdk-dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            openapi.admin.json
            openapi.integration.json
